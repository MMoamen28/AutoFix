version: '3.8'

# Define separate services for API and SQL Database
services:
  # autofix-api service: ASP.NET Core Web API
  autofix-api:
    build: .
    image: autofix-api:latest
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy # Wait for database to be ready
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Connection strings linking to the 'db' service name
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=AutoFixDB;User Id=sa;Password=AutoFix@1234;TrustServerCertificate=True
      - ConnectionStrings__Hangfire=Server=db,1433;Database=AutoFixDB;User Id=sa;Password=AutoFix@1234;TrustServerCertificate=True
    restart: unless-stopped
    networks:
      - autofix-network

  # db service: SQL Server 2022 image
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: autofix-db
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=AutoFix@1234
      - MSSQL_PID=Express
    volumes:
      # Data persistence even if container is removed
      - sqlserver_data:/var/opt/mssql # SQL Server data path changed slightly for 2022/Ubuntu
    healthcheck:
      # Use sqlcmd to check if server is responding (Updated path for 2022-latest)
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "AutoFix@1234", "-Q", "SELECT 1", "-C"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - autofix-network

# Network for communication between containers
networks:
  autofix-network:
    driver: bridge

# Named volume for persistent database storage
volumes:
  sqlserver_data:
