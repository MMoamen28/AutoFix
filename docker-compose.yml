version: "3.9"

services:

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    container_name: autofix-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    networks:
      - autofix-net

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: autofix-sqlserver
    environment:
      SA_PASSWORD: "AutoFix_Pass123"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - autofix-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autofix-api
    ports:
      - "5000:8080"
    depends_on:
      - sqlserver
      - keycloak
    environment:
      - ConnectionStrings__Default=Server=sqlserver,1433;Database=AutoFixDb;User Id=sa;Password=AutoFix_Pass123;TrustServerCertificate=True;
      - Keycloak__Authority=http://keycloak:8080/realms/autofix
      - Keycloak__Audience=autofix-api
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - autofix-net

volumes:
  sqlserver-data:

networks:
  autofix-net:
    driver: bridge
